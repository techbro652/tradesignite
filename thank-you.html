<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We'll Be In Touch — TradesIgnite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;

      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;

    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 56px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 16px;
    }
    h1 span { color: #E8651A; }
    p {
      font-size: 17px;
      color: #888;
      max-width: 440px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }
    a {
      background: #E8651A;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
    }

<body>
  <div>
    <div class="icon">🔥</div>
